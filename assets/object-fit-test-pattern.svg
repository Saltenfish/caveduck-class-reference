<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Object fit and position test pattern</title>
  <desc id="desc">A local tall asymmetric test image with top, left, center, right, and bottom markers for previewing CSS object-fit and object-position classes.</desc>
  <defs>
    <linearGradient id="topBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e" />
      <stop offset="0.52" stop-color="#22d3ee" />
      <stop offset="1" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="middleBand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3c7" />
      <stop offset="0.55" stop-color="#facc15" />
      <stop offset="1" stop-color="#fb7185" />
    </linearGradient>
    <linearGradient id="bottomBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c2d12" />
      <stop offset="0.45" stop-color="#be123c" />
      <stop offset="1" stop-color="#581c87" />
    </linearGradient>
    <pattern id="guideGrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.24" stroke-width="2" />
      <path d="M24 0V48M0 24H48" fill="none" stroke="#10212b" stroke-opacity="0.14" stroke-width="1" />
    </pattern>
    <filter id="labelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.28" />
    </filter>
  </defs>

  <rect width="900" height="260" fill="url(#topBand)" />
  <rect y="260" width="900" height="560" fill="url(#middleBand)" />
  <rect y="820" width="900" height="380" fill="url(#bottomBand)" />
  <rect width="900" height="1200" fill="url(#guideGrid)" />

  <path d="M0 0L900 1200M900 0L0 1200" stroke="#ffffff" stroke-opacity="0.52" stroke-width="8" />
  <path d="M450 0V1200M0 600H900" stroke="#10212b" stroke-opacity="0.42" stroke-width="5" stroke-dasharray="18 14" />
  <path d="M110 120H790V1080H110Z" fill="none" stroke="#ffffff" stroke-opacity="0.78" stroke-width="8" stroke-dasharray="24 16" />
  <path d="M220 230H680V970H220Z" fill="none" stroke="#10212b" stroke-opacity="0.42" stroke-width="4" stroke-dasharray="14 10" />

  <g filter="url(#labelShadow)" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-weight="900" letter-spacing="4">
    <rect x="290" y="42" width="320" height="100" rx="24" fill="#082f49" fill-opacity="0.86" />
    <text x="450" y="109" text-anchor="middle" font-size="54" fill="#ffffff">TOP</text>

    <rect x="34" y="460" width="198" height="126" rx="26" fill="#064e3b" fill-opacity="0.88" />
    <text x="133" y="539" text-anchor="middle" font-size="42" fill="#ffffff">LEFT</text>

    <rect x="668" y="460" width="198" height="126" rx="26" fill="#7f1d1d" fill-opacity="0.88" />
    <text x="767" y="539" text-anchor="middle" font-size="40" fill="#ffffff">RIGHT</text>

    <rect x="252" y="1050" width="396" height="102" rx="24" fill="#312e81" fill-opacity="0.9" />
    <text x="450" y="1118" text-anchor="middle" font-size="48" fill="#ffffff">BOTTOM</text>
  </g>

  <g transform="translate(450 640)" filter="url(#labelShadow)">
    <circle r="122" fill="#ffffff" fill-opacity="0.72" />
    <circle r="86" fill="none" stroke="#10212b" stroke-opacity="0.82" stroke-width="10" />
    <circle r="18" fill="#10212b" />
    <path d="M-168 0H168M0-168V168" stroke="#10212b" stroke-width="8" stroke-linecap="round" />
    <rect x="-168" y="122" width="336" height="74" rx="18" fill="#ffffff" fill-opacity="0.8" />
    <text y="174" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="900" fill="#10212b">CENTER</text>
  </g>

  <g fill="none" stroke="#ffffff" stroke-opacity="0.9" stroke-width="12" stroke-linecap="round">
    <path d="M34 138V34H138" />
    <path d="M762 34H866V138" />
    <path d="M34 1062V1166H138" />
    <path d="M762 1166H866V1062" />
  </g>
</svg>
